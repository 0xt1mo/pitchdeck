<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ CONSENSUS BOX ═══ -->
  <rect x="20" y="20" width="860" height="60" rx="8" fill="#fefefe" fill-opacity=".08" stroke="#fefefe" stroke-opacity=".2" stroke-width="1.5"/>
  <text x="450" y="58" text-anchor="middle" font-size="30" fill="#fefefe" font-variant="small-caps" font-family="Tahoma, Geneva, Verdana, sans-serif" letter-spacing="3">consensus (hybrid pow/pos)</text>

  <!-- Vertical connector consensus → prover -->
  <line x1="450" y1="80" x2="450" y2="120" stroke="#fefefe" stroke-opacity=".25" stroke-width="1.5"/>

  <!-- ═══ UNIQUENESS PROVER BOX ═══ -->
  <rect x="20" y="110" width="860" height="90" rx="10" fill="#F3B03D" fill-opacity=".12" stroke="#F3B03D" stroke-opacity=".6" stroke-width="2"/>
  <text x="450" y="148" text-anchor="middle" font-size="32" fill="#F3B03D" font-variant="small-caps" font-family="Tahoma, Geneva, Verdana, sans-serif" letter-spacing="4" font-weight="bold">zk uniqueness oracle</text>
  <text x="450" y="185" text-anchor="middle" font-size="22" fill="#F3B03D" fill-opacity=".7" font-style="italic" font-family="Tahoma, Geneva, Verdana, sans-serif">Single function: has this token been spent before?</text>

  <!-- ═══ FLASHING LINES: prover → agents ═══ -->
  <line x1="80"  y1="200" x2="80"  y2="300" stroke="#F3B03D" stroke-width="1.5" stroke-dasharray="6,4">
    <animate attributeName="stroke-opacity" values=".1;.8;.1" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="215" y1="200" x2="215" y2="330" stroke="#F3B03D" stroke-width="1.5" stroke-dasharray="6,4">
    <animate attributeName="stroke-opacity" values=".1;.8;.1" dur="0.5s" repeatCount="indefinite" begin="0.07s"/>
  </line>
  <line x1="350" y1="200" x2="350" y2="280" stroke="#F3B03D" stroke-width="1.5" stroke-dasharray="6,4">
    <animate attributeName="stroke-opacity" values=".1;.8;.1" dur="0.5s" repeatCount="indefinite" begin="0.14s"/>
  </line>
  <line x1="490" y1="200" x2="490" y2="350" stroke="#F3B03D" stroke-width="1.5" stroke-dasharray="6,4">
    <animate attributeName="stroke-opacity" values=".1;.8;.1" dur="0.5s" repeatCount="indefinite" begin="0.21s"/>
  </line>
  <line x1="620" y1="200" x2="620" y2="300" stroke="#F3B03D" stroke-width="1.5" stroke-dasharray="6,4">
    <animate attributeName="stroke-opacity" values=".1;.8;.1" dur="0.5s" repeatCount="indefinite" begin="0.28s"/>
  </line>
  <line x1="740" y1="200" x2="740" y2="330" stroke="#F3B03D" stroke-width="1.5" stroke-dasharray="6,4">
    <animate attributeName="stroke-opacity" values=".1;.8;.1" dur="0.5s" repeatCount="indefinite" begin="0.35s"/>
  </line>
  <line x1="850" y1="200" x2="850" y2="290" stroke="#F3B03D" stroke-width="1.5" stroke-dasharray="6,4">
    <animate attributeName="stroke-opacity" values=".1;.8;.1" dur="0.5s" repeatCount="indefinite" begin="0.42s"/>
  </line>

  <!-- ═══ AGENT NODES ═══ -->
  <circle cx="80" cy="310" r="18" fill="#5EC9F7" fill-opacity=".08" stroke="#5EC9F7" stroke-width="1.5" stroke-opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".3;.7;.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="310" r="8" fill="#5EC9F7" fill-opacity=".5">
    <animate attributeName="fill-opacity" values=".3;.6;.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="215" cy="340" r="18" fill="#5EC9F7" fill-opacity=".08" stroke="#5EC9F7" stroke-width="1.5" stroke-opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".3;.7;.3" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="215" cy="340" r="8" fill="#5EC9F7" fill-opacity=".5">
    <animate attributeName="fill-opacity" values=".3;.6;.3" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
  </circle>

  <circle cx="350" cy="290" r="18" fill="#5EC9F7" fill-opacity=".08" stroke="#5EC9F7" stroke-width="1.5" stroke-opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".3;.7;.3" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="350" cy="290" r="8" fill="#5EC9F7" fill-opacity=".5">
    <animate attributeName="fill-opacity" values=".3;.6;.3" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
  </circle>

  <circle cx="490" cy="360" r="18" fill="#5EC9F7" fill-opacity=".08" stroke="#5EC9F7" stroke-width="1.5" stroke-opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".3;.7;.3" dur="1.4s" repeatCount="indefinite" begin="0.1s"/>
  </circle>
  <circle cx="490" cy="360" r="8" fill="#5EC9F7" fill-opacity=".5">
    <animate attributeName="fill-opacity" values=".3;.6;.3" dur="1.4s" repeatCount="indefinite" begin="0.1s"/>
  </circle>

  <circle cx="620" cy="310" r="18" fill="#5EC9F7" fill-opacity=".08" stroke="#5EC9F7" stroke-width="1.5" stroke-opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".3;.7;.3" dur="1.7s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="620" cy="310" r="8" fill="#5EC9F7" fill-opacity=".5">
    <animate attributeName="fill-opacity" values=".3;.6;.3" dur="1.7s" repeatCount="indefinite" begin="0.3s"/>
  </circle>

  <circle cx="740" cy="340" r="18" fill="#5EC9F7" fill-opacity=".08" stroke="#5EC9F7" stroke-width="1.5" stroke-opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".3;.7;.3" dur="1.3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="740" cy="340" r="8" fill="#5EC9F7" fill-opacity=".5">
    <animate attributeName="fill-opacity" values=".3;.6;.3" dur="1.3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <circle cx="850" cy="300" r="18" fill="#5EC9F7" fill-opacity=".08" stroke="#5EC9F7" stroke-width="1.5" stroke-opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".3;.7;.3" dur="1.5s" repeatCount="indefinite" begin="0.15s"/>
  </circle>
  <circle cx="850" cy="300" r="8" fill="#5EC9F7" fill-opacity=".5">
    <animate attributeName="fill-opacity" values=".3;.6;.3" dur="1.5s" repeatCount="indefinite" begin="0.15s"/>
  </circle>

  <!-- ═══ PARTICLES between agents (both directions) ═══ -->
  <!-- Agent1 → Agent2 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="80;215"  dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="310;340" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Agent2 → Agent1 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="215;80"  dur="0.65s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="cy" values="340;310" dur="0.65s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.65s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <!-- Agent2 → Agent3 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="215;350" dur="0.65s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="cy" values="340;290" dur="0.65s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.65s" repeatCount="indefinite" begin="0.15s"/>
  </circle>
  <!-- Agent3 → Agent2 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="350;215" dur="0.6s" repeatCount="indefinite" begin="0.45s"/>
    <animate attributeName="cy" values="290;340" dur="0.6s" repeatCount="indefinite" begin="0.45s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.6s" repeatCount="indefinite" begin="0.45s"/>
  </circle>
  <!-- Agent3 → Agent4 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="350;490" dur="0.7s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="cy" values="290;360" dur="0.7s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.7s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <!-- Agent4 → Agent3 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="490;350" dur="0.65s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="cy" values="360;290" dur="0.65s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.65s" repeatCount="indefinite" begin="0.1s"/>
  </circle>
  <!-- Agent4 → Agent5 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="490;620" dur="0.6s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="cy" values="360;310" dur="0.6s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.6s" repeatCount="indefinite" begin="0.1s"/>
  </circle>
  <!-- Agent5 → Agent4 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="620;490" dur="0.65s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="cy" values="310;360" dur="0.65s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.65s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <!-- Agent5 → Agent6 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="620;740" dur="0.55s" repeatCount="indefinite" begin="0.25s"/>
    <animate attributeName="cy" values="310;340" dur="0.55s" repeatCount="indefinite" begin="0.25s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.55s" repeatCount="indefinite" begin="0.25s"/>
  </circle>
  <!-- Agent6 → Agent5 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="740;620" dur="0.6s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="340;310" dur="0.6s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.6s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Agent6 → Agent7 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="740;850" dur="0.6s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="cy" values="340;300" dur="0.6s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.6s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <!-- Agent7 → Agent6 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="850;740" dur="0.55s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="cy" values="300;340" dur="0.55s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="opacity" values="0;.8;.8;0" dur="0.55s" repeatCount="indefinite" begin="0.15s"/>
  </circle>
  <!-- Cross: Agent1 → Agent4 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="80;490" dur="1s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="cy" values="310;360" dur="1s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="opacity" values="0;.5;.5;0" dur="1s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <!-- Cross: Agent4 → Agent1 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="490;80" dur="1.1s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="cy" values="360;310" dur="1.1s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0;.5;.5;0" dur="1.1s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <!-- Cross: Agent2 → Agent5 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="215;620" dur="1s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="340;310" dur="1s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;.5;.5;0" dur="1s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Cross: Agent5 → Agent2 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="620;215" dur="1.05s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="cy" values="310;340" dur="1.05s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="opacity" values="0;.5;.5;0" dur="1.05s" repeatCount="indefinite" begin="0.1s"/>
  </circle>
  <!-- Cross: Agent3 → Agent7 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="350;850" dur="1.1s" repeatCount="indefinite" begin="0.35s"/>
    <animate attributeName="cy" values="290;300" dur="1.1s" repeatCount="indefinite" begin="0.35s"/>
    <animate attributeName="opacity" values="0;.5;.5;0" dur="1.1s" repeatCount="indefinite" begin="0.35s"/>
  </circle>
  <!-- Cross: Agent7 → Agent3 -->
  <circle r="3" fill="#5EC9F7" opacity="0" filter="url(#glow)">
    <animate attributeName="cx" values="850;350" dur="1s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="cy" values="300;290" dur="1s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="opacity" values="0;.5;.5;0" dur="1s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <!-- ═══ LABEL ═══ -->
  <text x="450" y="420" text-anchor="middle" font-size="28" fill="#F3B03D" font-variant="small-caps" font-family="Tahoma, Geneva, Verdana, sans-serif" letter-spacing="3">agent execution layer</text>
  <text x="450" y="450" text-anchor="middle" font-size="22" fill="#F3B03D" fill-opacity=".7" font-style="italic" font-family="Tahoma, Geneva, Verdana, sans-serif">Tokens are self-authenticating objects that move peer to peer</text>
</svg>
